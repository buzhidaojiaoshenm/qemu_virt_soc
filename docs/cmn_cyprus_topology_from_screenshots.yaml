# Draft CMN topology/config extracted manually from screenshots.
#
# Status:
# - This file is intentionally review-first, not source-of-truth.
# - Fields marked with TODO/UNCERTAIN come from ambiguous screenshot OCR or
#   partially occluded lines and must be checked manually before being used to
#   drive the QEMU CMN model.
# - The structure mirrors the screenshot layout rather than the current QEMU
#   implementation details.

meta:
  source: screenshot_manual_transcription
  status: draft_for_review
  notes:
    - XP/node ids shown here are copied from screenshots where visible.
    - Some address_block entries are inferred from partially visible lines.
    - Empty address_block lists are preserved where the screenshot showed none.
    - Several devices appear to expose multiple address blocks for the same id.

